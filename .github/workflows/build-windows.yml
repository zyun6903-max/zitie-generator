name: Build Windows Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate icon (skip if app.ico exists)
        shell: pwsh
        run: |
          if (-not (Test-Path "app.ico")) {
            python generate_icon.py
          } else {
            Write-Host "app.ico already exists, skipping icon generation"
          }

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller build.spec --noconfirm
          Write-Host "PyInstaller build completed"
          Get-ChildItem -Path "dist" -Recurse | Select-Object FullName

      - name: Build NSIS installer
        shell: pwsh
        run: |
          # Find NSIS
          $nsisPaths = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $makensis = $null
          foreach ($p in $nsisPaths) {
            if (Test-Path $p) {
              $makensis = $p
              break
            }
          }
          if (-not $makensis) {
            Write-Host "NSIS not found, installing via chocolatey..."
            choco install nsis -y
            $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          }
          Write-Host "Using NSIS: $makensis"
          & $makensis installer.nsi
          Write-Host "NSIS installer build completed"

      - name: List build output
        shell: pwsh
        run: |
          Write-Host "=== dist directory ==="
          Get-ChildItem -Path "dist" -Recurse | Select-Object FullName, Length
          Write-Host "=== Looking for installer ==="
          Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object FullName, Length

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: zitie-windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload portable folder
        uses: actions/upload-artifact@v4
        with:
          name: zitie-windows-portable
          path: dist/字帖生成器/
          if-no-files-found: warn
